<div class="fund-card" [class.fund-card--subscribed]="isSubscribed()">
  <!-- Top row: categoria + badge suscrito -->
  <div class="fund-card__top">
    <span class="fund-card__category" [class.fund-card__category--fic]="fund().category === 'FIC'">
      {{ fund().category }}
    </span>
    @if (isSubscribed()) {
      <span class="fund-card__badge">
        <mat-icon class="fund-card__badge-icon">check_circle</mat-icon>
        Suscrito
      </span>
    }
  </div>

  <!-- Icono central -->
  <div class="fund-card__icon-wrapper">
    <mat-icon class="fund-card__icon">
      {{ fund().category === 'FPV' ? 'savings' : 'account_balance_wallet' }}
    </mat-icon>
  </div>

  <!-- Nombre del fondo -->
  <span class="fund-card__name">{{ fund().name }}</span>

  <!-- Monto minimo -->
  <div class="fund-card__amount-section">
    <span class="fund-card__label">Monto minimo</span>
    <span class="fund-card__amount">{{ fund().minAmount | currency:'COP':'symbol-narrow':'1.0-0' }}</span>
  </div>

  <!-- Accion -->
  <div class="fund-card__actions">
    @if (isSubscribed()) {
      <button mat-stroked-button color="warn" class="fund-card__btn" (click)="onCancel.emit(fund())">
        <mat-icon>cancel</mat-icon>
        Cancelar
      </button>
    } @else {
      <button mat-flat-button class="fund-card__btn" (click)="onSubscribe.emit(fund())">
        <mat-icon>add_circle</mat-icon>
        Suscribirse
      </button>
    }
  </div>
</div>
